<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>⚓ Admin COLREG-72 - Gestione Avanzata</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0c2e42; padding: 20px; }
        .admin-container { max-width: 1400px; margin: 0 auto; background: #fef9f0; border-radius: 28px; overflow: hidden; }
        .admin-header { background: linear-gradient(135deg, #0c3d66, #1b5e8c); padding: 20px 24px; color: white; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; }
        .btn { background: #ffcd94; border: none; padding: 8px 16px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 4px; }
        .btn-primary { background: #f4a261; color: #2c3e2f; }
        .stats-badge { background: #1e5a7a; border-radius: 40px; padding: 5px 15px; }
        .section-card { background: white; margin: 20px; padding: 20px; border-radius: 28px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 15px; margin-top: 15px; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        input, select, textarea { padding: 8px; border-radius: 12px; border: 1px solid #cbd5e1; }
        .rank-times { display: grid; grid-template-columns: repeat(2,1fr); gap: 15px; background: #fdf8e7; padding: 15px; border-radius: 20px; margin-top: 10px; }
        .question-table { overflow-x: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 0.8rem; }
        th { background: #d9eef5; }
        .actions { display: flex; gap: 6px; }
        .icon-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; max-width: 600px; width: 90%; border-radius: 32px; padding: 24px; }
        .hidden { display: none; }
        .success-toast { position: fixed; bottom: 20px; right: 20px; background: #0c5e2e; color: white; padding: 12px 20px; border-radius: 60px; z-index: 1100; }
        h3 { margin: 15px 0 5px 0; color: #0c3d66; }
        hr { margin: 15px 0; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header">
        <h1>⚓ COLREG-72 · PANNELLO AMMINISTRATIVO</h1>
        <div><button class="btn" id="exportJsonBtn">📎 Esporta JSON</button>
        <button class="btn btn-primary" id="syncFromFirestoreBtn">🔄 Sincronizza tutto</button>
        <button class="btn" id="openGameBtn">🎮 Apri gioco</button></div>
        <div class="stats-badge" id="statsCounter">Domande: 0</div>
    </div>

    <!-- SEZIONE IMPOSTAZIONI GLOBALI (IMMAGINE PRINCIPALE + TEMPI RANK) -->
    <div class="section-card">
        <h2>⚙️ Impostazioni Generali della Partita</h2>
        <div class="form-grid">
            <div class="field">
                <label>URL Immagine principale (schermata login)</label>
                <input type="text" id="mainImageUrl" placeholder="https://...">
                <button class="btn" id="updateMainImageBtn" style="margin-top:5px;">🖼️ Aggiorna immagine</button>
            </div>
            <div class="field">
                <label>Tempi per grado (secondi)</label>
                <div class="rank-times">
                    <div><label>All.vo 1^a Cl.</label><input type="number" id="rankTime1" value="60" step="5"></div>
                    <div><label>All.vo 2^a Cl.</label><input type="number" id="rankTime2" value="50" step="5"></div>
                    <div><label>Aspirante</label><input type="number" id="rankTime3" value="40" step="5"></div>
                    <div><label>Ufficiale</label><input type="number" id="rankTime4" value="30" step="5"></div>
                </div>
                <button class="btn btn-primary" id="saveRankTimesBtn" style="margin-top:10px;">💾 Salva tempi per grado</button>
            </div>
        </div>
        <div class="field" style="margin-top:15px;">
            <label>Anteprima immagine attuale:</label>
            <img id="previewMainImage" src="" style="max-width:200px; border-radius:16px; border:2px solid #0ea5e9; margin-top:8px;">
        </div>
    </div>

    <!-- GESTIONE DOMANDE (uguale a prima ma con migliorie) -->
    <div class="section-card">
        <h2>📚 Gestione Domande (55 domande originali già presenti)</h2>
        <div class="add-section" style="margin:0 0 20px 0; background:#fdf8e7; padding:15px; border-radius:20px;">
            <h3>➕ Aggiungi nuova domanda</h3>
            <div class="form-grid">
                <div class="field"><label>Sezione</label><input type="number" id="newSection" value="1"></div>
                <div class="field"><label>Categoria</label><input id="newCategory" placeholder="es. Luci"></div>
                <div class="field"><label>Domanda *</label><input id="newQuestion" placeholder="Testo domanda"></div>
                <div class="field"><label>Risposta 1 *</label><input id="newAns0"></div>
                <div class="field"><label>Risposta 2 *</label><input id="newAns1"></div>
                <div class="field"><label>Risposta 3 *</label><input id="newAns2"></div>
                <div class="field"><label>Risposta 4 *</label><input id="newAns3"></div>
                <div class="field"><label>Corretta (0-3)</label><select id="newCorrect"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
                <div class="field"><label>Spiegazione</label><textarea id="newExplanation" rows="2"></textarea></div>
                <div class="field"><label>URL Immagine domanda</label><input id="newImage" placeholder="https://..."></div>
            </div>
            <button class="btn btn-primary" id="addQuestionBtn">➕ Aggiungi e salva su Cloud</button>
        </div>
        <div class="question-table">
            <table id="questionsTable"><thead><tr><th>ID</th><th>Sez.</th><th>Categoria</th><th>Domanda</th><th>Risposte</th><th>Corr.</th><th>Immagine</th><th>Azioni</th></tr></thead><tbody id="tableBody"></tbody></table>
        </div>
    </div>
</div>

<!-- Modale modifica domanda -->
<div id="editModal" class="modal hidden"><div class="modal-card"><h2>✏️ Modifica domanda</h2><div class="form-grid"><input type="hidden" id="editId"><div class="field"><label>Sezione</label><input id="editSection"></div><div class="field"><label>Categoria</label><input id="editCategory"></div><div class="field"><label>Domanda</label><textarea id="editQuestion" rows="2"></textarea></div><div class="field"><label>Risposta 1</label><input id="editAns0"></div><div class="field"><label>Risposta 2</label><input id="editAns1"></div><div class="field"><label>Risposta 3</label><input id="editAns2"></div><div class="field"><label>Risposta 4</label><input id="editAns3"></div><div class="field"><label>Corretta (0-3)</label><select id="editCorrect"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div><div class="field"><label>Spiegazione</label><textarea id="editExplanation" rows="2"></textarea></div><div class="field"><label>URL Immagine</label><input id="editImage"></div></div><div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;"><button class="btn" id="closeModalBtn">Annulla</button><button class="btn btn-primary" id="saveEditBtn">Salva modifiche</button></div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDg8l-21evrxooOm5YymcGuVMCEHwN-vg4",
        authDomain: "pone-rino.firebaseapp.com",
        projectId: "pone-rino",
        storageBucket: "pone-rino.firebasestorage.app",
        messagingSenderId: "334444369538",
        appId: "1:334444369538:web:9840e92dc8d562f1dc869b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQuestions = [];

    // ------------------- FUNZIONI GESTIONE IMPOSTAZIONI -------------------
    async function loadSettings() {
        const doc = await db.collection("settings").doc("gameSettings").get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById("mainImageUrl").value = data.mainImageUrl || "";
            document.getElementById("previewMainImage").src = data.mainImageUrl || "";
            if (data.rankTimes) {
                document.getElementById("rankTime1").value = data.rankTimes["All.vo 1^a Cl."] || 60;
                document.getElementById("rankTime2").value = data.rankTimes["All.vo 2^a Cl."] || 50;
                document.getElementById("rankTime3").value = data.rankTimes["Aspirante"] || 40;
                document.getElementById("rankTime4").value = data.rankTimes["Ufficiale"] || 30;
            }
        } else {
            // valori di default
            document.getElementById("rankTime1").value = 60;
            document.getElementById("rankTime2").value = 50;
            document.getElementById("rankTime3").value = 40;
            document.getElementById("rankTime4").value = 30;
        }
    }

    async function saveMainImage() {
        const url = document.getElementById("mainImageUrl").value.trim();
        if (!url) { alert("Inserisci un URL valido"); return; }
        await db.collection("settings").doc("gameSettings").set({
            mainImageUrl: url,
            rankTimes: {
                "All.vo 1^a Cl.": parseInt(document.getElementById("rankTime1").value),
                "All.vo 2^a Cl.": parseInt(document.getElementById("rankTime2").value),
                "Aspirante": parseInt(document.getElementById("rankTime3").value),
                "Ufficiale": parseInt(document.getElementById("rankTime4").value)
            }
        }, { merge: true });
        document.getElementById("previewMainImage").src = url;
        showToast("✅ Immagine principale aggiornata!");
    }

    async function saveRankTimes() {
        const times = {
            "All.vo 1^a Cl.": parseInt(document.getElementById("rankTime1").value),
            "All.vo 2^a Cl.": parseInt(document.getElementById("rankTime2").value),
            "Aspirante": parseInt(document.getElementById("rankTime3").value),
            "Ufficiale": parseInt(document.getElementById("rankTime4").value)
        };
        await db.collection("settings").doc("gameSettings").set({ rankTimes: times }, { merge: true });
        showToast("✅ Tempi per grado salvati!");
    }

    // ------------------- GESTIONE DOMANDE (IDENTICA A PRIMA) -------------------
    async function loadFromFirestore() {
        const snap = await db.collection("questions").orderBy("id").get();
        let qs = [];
        snap.forEach(doc => { qs.push({ ...doc.data(), firestoreId: doc.id }); });
        currentQuestions = qs;
        refreshTable();
        document.getElementById('statsCounter').innerText = `Domande: ${currentQuestions.length}`;
    }
    async function saveToFirestore() {
        const batch = db.batch();
        const allDocs = await db.collection("questions").get();
        allDocs.forEach(doc => batch.delete(doc.ref));
        for (let q of currentQuestions) {
            const docRef = db.collection("questions").doc(q.id.toString());
            batch.set(docRef, q);
        }
        await batch.commit();
        showToast("✅ Database domande sincronizzato!");
    }
    async function deleteQuestion(id) {
        if(confirm("Eliminare definitivamente?")) {
            currentQuestions = currentQuestions.filter(q => q.id !== id);
            reorderIds();
            await saveToFirestore();
            loadFromFirestore();
        }
    }
    function reorderIds() {
        currentQuestions.sort((a,b)=>a.id-b.id);
        for(let i=0;i<currentQuestions.length;i++) currentQuestions[i].id = i+1;
    }
    function refreshTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        currentQuestions.forEach(q => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = q.id;
            row.insertCell(1).innerText = q.section;
            row.insertCell(2).innerText = q.category || '-';
            row.insertCell(3).innerHTML = `<div style="max-width:200px">${q.question.substring(0,60)}</div>`;
            row.insertCell(4).innerHTML = q.answers.map((a,i)=> `${i===q.correctAnswer?'✓':''} ${a.substring(0,15)}`).join(' | ');
            row.insertCell(5).innerText = q.correctAnswer;
            row.insertCell(6).innerHTML = q.image ? `<img src="${q.image}" style="max-width:50px; max-height:40px; border-radius:8px;">` : '—';
            row.insertCell(7).innerHTML = `<div class="actions"><button class="icon-btn edit" data-id="${q.id}">✏️</button><button class="icon-btn delete" data-id="${q.id}">🗑️</button></div>`;
        });
        document.querySelectorAll('.edit').forEach(btn => btn.addEventListener('click', (e) => openEditModal(parseInt(btn.dataset.id))));
        document.querySelectorAll('.delete').forEach(btn => btn.addEventListener('click', (e) => deleteQuestion(parseInt(btn.dataset.id))));
    }
    async function addNewQuestion() {
        let section = parseInt(document.getElementById('newSection').value);
        let category = document.getElementById('newCategory').value;
        let question = document.getElementById('newQuestion').value.trim();
        let ans = [document.getElementById('newAns0').value, document.getElementById('newAns1').value, document.getElementById('newAns2').value, document.getElementById('newAns3').value];
        if(!question || ans.some(a=>!a.trim())) { alert("Domanda e 4 risposte obbligatorie"); return; }
        let correct = parseInt(document.getElementById('newCorrect').value);
        let explanation = document.getElementById('newExplanation').value || "Regola COLREG";
        let image = document.getElementById('newImage').value || null;
        const newId = currentQuestions.length + 1;
        const newQ = { id: newId, section, category, question, answers: ans, correctAnswer: correct, explanation, image };
        currentQuestions.push(newQ);
        reorderIds();
        await saveToFirestore();
        loadFromFirestore();
        document.getElementById('newQuestion').value = '';
        document.getElementById('newAns0').value = ''; document.getElementById('newAns1').value = ''; document.getElementById('newAns2').value = ''; document.getElementById('newAns3').value = '';
        document.getElementById('newExplanation').value = '';
        document.getElementById('newImage').value = '';
    }
    function openEditModal(id) {
        const q = currentQuestions.find(qq => qq.id === id);
        if(!q) return;
        document.getElementById('editId').value = q.id;
        document.getElementById('editSection').value = q.section;
        document.getElementById('editCategory').value = q.category || '';
        document.getElementById('editQuestion').value = q.question;
        document.getElementById('editAns0').value = q.answers[0];
        document.getElementById('editAns1').value = q.answers[1];
        document.getElementById('editAns2').value = q.answers[2];
        document.getElementById('editAns3').value = q.answers[3];
        document.getElementById('editCorrect').value = q.correctAnswer;
        document.getElementById('editExplanation').value = q.explanation || '';
        document.getElementById('editImage').value = q.image || '';
        document.getElementById('editModal').classList.remove('hidden');
    }
    async function saveEdit() {
        const id = parseInt(document.getElementById('editId').value);
        const index = currentQuestions.findIndex(q => q.id === id);
        if(index === -1) return;
        const updated = {
            ...currentQuestions[index],
            section: parseInt(document.getElementById('editSection').value),
            category: document.getElementById('editCategory').value,
            question: document.getElementById('editQuestion').value,
            answers: [document.getElementById('editAns0').value, document.getElementById('editAns1').value, document.getElementById('editAns2').value, document.getElementById('editAns3').value],
            correctAnswer: parseInt(document.getElementById('editCorrect').value),
            explanation: document.getElementById('editExplanation').value,
            image: document.getElementById('editImage').value || null
        };
        currentQuestions[index] = updated;
        reorderIds();
        await saveToFirestore();
        loadFromFirestore();
        closeModal();
    }
    function closeModal() { document.getElementById('editModal').classList.add('hidden'); }
    function showToast(msg) { let t = document.createElement('div'); t.className = 'success-toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
    async function exportJSON() { const dataStr = JSON.stringify(currentQuestions, null, 2); const blob = new Blob([dataStr], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'colreg_questions.json'; a.click(); URL.revokeObjectURL(a.href); }

    // Event listeners
    document.getElementById('addQuestionBtn').addEventListener('click', addNewQuestion);
    document.getElementById('syncFromFirestoreBtn').addEventListener('click', () => { loadFromFirestore(); loadSettings(); });
    document.getElementById('exportJsonBtn').addEventListener('click', exportJSON);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
    document.getElementById('openGameBtn').addEventListener('click', () => window.open('index.html', '_blank'));
    document.getElementById('updateMainImageBtn').addEventListener('click', saveMainImage);
    document.getElementById('saveRankTimesBtn').addEventListener('click', saveRankTimes);

    // Avvio
    loadFromFirestore();
    loadSettings();
</script>
</body>
</html>
