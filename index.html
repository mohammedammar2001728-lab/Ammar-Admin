<!DOCTYPE html>
<html lang="it" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Amministratore - Gestione Delegazioni</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Changa:wght@500;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK 8.10.0 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #0a0f1f; color: #eef2ff; background-image: radial-gradient(circle at 10% 20%, #1e293b, #020617); }
        .auth-overlay { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 10000; padding: 16px; }
        .login-card { background: #111827; padding: 1.5rem; border-radius: 2rem; width: 100%; max-width: 400px; border: 1px solid #00d2ff; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 12px 0; border-radius: 40px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 16px; }
        .btn-glow { background: #00d2ff; border: none; padding: 12px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; color: #000; font-size: 16px; }
        header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00d2ff; position: sticky; top: 0; z-index: 900; flex-wrap: wrap; gap: 10px; }
        .logo { font-family: 'Changa', sans-serif; font-size: 1.2rem; color: #00d2ff; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; padding: 16px; }
        .stat-card { background: #1e293b; padding: 8px; border-radius: 16px; text-align: center; cursor: pointer; }
        .stat-card .val { font-size: 1.4rem; font-weight: 800; }
        .stat-card h4 { font-size: 0.65rem; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; padding: 16px; }
        @media (min-width: 900px) { .dashboard { grid-template-columns: 360px 1fr; } }
        .panel { background: #1e293b; border-radius: 24px; padding: 16px; border: 1px solid rgba(255,255,255,0.05); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 20px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 14px; }
        .country-card { background: #1e293b; border-radius: 20px; margin-bottom: 20px; border-right: 5px solid #00d2ff; overflow-x: auto; }
        .country-header { padding: 12px 16px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .country-header h3 { font-size: 1rem; }
        .country-body { padding: 8px; overflow-x: auto; }
        table { width: 100%; min-width: 500px; border-collapse: collapse; }
        th { text-align: right; padding: 8px; font-size: 0.7rem; color: #94a3b8; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.75rem; }
        .badge { padding: 4px 8px; border-radius: 40px; font-size: 0.65rem; white-space: nowrap; }
        .search-box { position: relative; margin-bottom: 16px; }
        .search-box i { position: absolute; right: 16px; top: 14px; color: #00d2ff; }
        .search-box input { padding-right: 40px; }
        .modal { position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98); display: none; flex-direction: column; z-index: 2000; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-sm { background: #334155; border: none; padding: 6px 12px; border-radius: 40px; color: white; cursor: pointer; font-size: 0.7rem; margin: 2px; white-space: nowrap; }
        .select-all-bar { background: #0f172a; padding: 10px; border-radius: 20px; margin-bottom: 15px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
        .select-all-bar select { width: auto; flex: 1; min-width: 120px; }
        footer { text-align: center; padding: 16px; font-size: 0.7rem; color: #64748b; }
        /* تحسينات إضافية للجوال */
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .stat-card .val { font-size: 1.2rem; }
            .stat-card h4 { font-size: 0.6rem; }
            .btn-sm { font-size: 0.6rem; padding: 4px 8px; }
            .country-header h3 { font-size: 0.9rem; }
            td { font-size: 0.7rem; }
            .select-all-bar { flex-direction: column; align-items: stretch; }
            .select-all-bar select { width: 100%; }
            .logo { font-size: 1rem; }
        }
    </style>
</head>
<body>
<!-- نفس محتوى admin.html السابق تماماً، لم يتغير أي شيء في HTML أو JavaScript -->
<div id="authScreen" class="auth-overlay">
    <div class="login-card">
        <i class="fas fa-crown" style="font-size: 3rem; color: #f59e0b; margin-bottom: 15px;"></i>
        <h2>Amministratore</h2>
        <input type="text" id="loginUser" placeholder="Nome utente">
        <input type="password" id="loginPass" placeholder="Password">
        <button class="btn-glow" onclick="attemptLogin()">Accedi</button>
        <p style="margin-top:15px; font-size:0.7rem;">admin / admin</p>
    </div>
</div>

<header><div class="logo"><i class="fas fa-globe"></i> Pannello Amministratore</div><div><span id="userBadge" class="badge bg-boat"></span><button onclick="logout()" style="background:none; border:none; color:#ff3131; margin-right:15px;"><i class="fas fa-sign-out-alt"></i> Esci</button></div></header>
<div class="stats-row" id="statsRow"></div>
<div class="dashboard"><aside id="sidePanel"></aside><section><div class="search-box"><i class="fas fa-search"></i><input type="text" id="globalSearch" placeholder="Cerca paese..." onkeyup="filterCountries()"></div><div id="countriesContainer"></div></section></div>
<footer>Sistema in tempo reale – Gestione completa delegazioni</footer>
<div id="detailModal" class="modal"><div class="modal-header"><h2 id="modalTitle" style="color:#00d2ff;"></h2><button onclick="closeModal()" style="background:none; border:none; color:white; font-size:2rem;">&times;</button></div><div id="modalContent"></div></div>

<script>
    // (JavaScript identico a prima, nessuna modifica)
    const firebaseConfig = {
        apiKey: "AIzaSyA0s75nCTHU00rVVBnsDAstRMy985hB6cI",
        authDomain: "giocco-di-ammar.firebaseapp.com",
        databaseURL: "https://giocco-di-ammar-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "giocco-di-ammar",
        storageBucket: "giocco-di-ammar.firebasestorage.app",
        messagingSenderId: "717871853784",
        appId: "1:717871853784:web:db1cebe5497bb67b8a67ad",
        measurementId: "G-RPP64WT3J6"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = null;
    let allUsers = {};
    let allMembers = {};

    async function initDemoData() {
        const usersRef = db.ref('users');
        const snapshot = await usersRef.once('value');
        if (!snapshot.exists()) {
            await usersRef.set({
                admin: { id: 1, username: "admin", password: "admin", role: "admin", country: null, phone: "", fullName: "Amministratore" },
                coord1: { id: 2, username: "coord1", password: "123", role: "coord", country: "🇪🇬 Egitto", phone: "+20123456789", fullName: "Ahmed Egiziano" },
                coord2: { id: 3, username: "coord2", password: "123", role: "coord", country: "🇸🇦 Arabia Saudita", phone: "+966500000000", fullName: "Khalid Saudita" }
            });
        }
        const membersRef = db.ref('members');
        const membersSnap = await membersRef.once('value');
        if (!membersSnap.exists()) {
            const now = new Date().toLocaleString('it-IT');
            await membersRef.set({
                m1: { id: 101, name: "Ahmed Ali", rank: "Guardiamarina", country: "🇪🇬 Egitto", phone: "+201111111111", status: "in_accademia", lastUpdate: now },
                m2: { id: 102, name: "Carlos", rank: "Tenente di Vascello", country: "🇪🇬 Egitto", phone: "+201222222222", status: "on_boats", lastUpdate: now },
                m3: { id: 103, name: "Sara", rank: "Capitano di Corvetta", country: "🇸🇦 Arabia Saudita", phone: "+966555555555", status: "out_accademia", lastUpdate: now },
                m4: { id: 104, name: "Naser", rank: "Ammiraglio di Divisione", country: "🇸🇦 Arabia Saudita", phone: "+966666666666", status: "prep_out", lastUpdate: now }
            });
        }
    }
    initDemoData();

    function addLog(action, details) {
        const logRef = db.ref('logs').push();
        logRef.set({ time: new Date().toLocaleString('it-IT'), user: currentUser?.username || "admin", action, details });
    }

    function refreshStats() {
        const members = Object.values(allMembers);
        document.getElementById("statsRow").innerHTML = `
            <div class="stat-card" onclick="openDetailModal('all')"><h4>Totale Membri</h4><div class="val">${members.length}</div></div>
            <div class="stat-card" onclick="openDetailModal('in_accademia')"><h4>In Accademia</h4><div class="val c-in">${members.filter(m=>m.status==='in_accademia').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('out_accademia')"><h4>Fuori Accademia</h4><div class="val c-out">${members.filter(m=>m.status==='out_accademia').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('prep_out')"><h4>Prep. Uscita</h4><div class="val c-prep-out">${members.filter(m=>m.status==='prep_out').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('prep_in')"><h4>Prep. Entrata</h4><div class="val c-prep-in">${members.filter(m=>m.status==='prep_in').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('on_boats')"><h4>Sulle Barche</h4><div class="val c-boat">${members.filter(m=>m.status==='on_boats').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('prep_boats')"><h4>Prep. Barche</h4><div class="val c-prep-boat">${members.filter(m=>m.status==='prep_boats').length}</div></div>
            <div class="stat-card" onclick="openDetailModal('exceptional')"><h4>Eccezionale</h4><div class="val c-warn">${members.filter(m=>m.status==='exceptional').length}</div></div>
        `;
    }

    function renderSidePanel() {
        const panel = document.getElementById("sidePanel");
        panel.innerHTML = `
            <div class="panel">
                <h3><i class="fas fa-user-plus"></i> Gestione Accompagnatori</h3>
                <input id="newUser" placeholder="Nome utente">
                <input id="newPass" placeholder="Password">
                <input id="newFullName" placeholder="Nome completo">
                <input id="newCountry" placeholder="Paese (es. 🇫🇷 Francia)">
                <input id="newPhone" placeholder="Telefono">
                <button class="btn-glow" onclick="addCoordinator()" style="background:#f59e0b;">Crea accompagnatore</button>
                <div id="coordsList"></div>
                <hr>
                <button class="btn-sm" onclick="openLogsModal()"><i class="fas fa-history"></i> Registro generale</button>
                <button class="btn-sm" onclick="exportData()"><i class="fas fa-download"></i> Esporta CSV</button>
            </div>
        `;
        renderCoordsList();
    }

    function renderCoordsList() {
        const container = document.getElementById("coordsList");
        if (!container) return;
        const coords = Object.values(allUsers).filter(u => u.role === "coord");
        container.innerHTML = coords.map(u => `
            <div style="background:#0f172a; margin:5px 0; padding:8px; border-radius:12px;">
                <b>${u.username}</b> - ${u.fullName || 'Senza nome'} (${u.country || "—"})<br>
                <small>Tel: ${u.phone || "—"}</small>
                <button class="btn-sm" onclick="resetCoordPass('${u.username}')">Reimposta password</button>
                <button class="btn-sm" style="background:#dc2626;" onclick="deleteCoord('${u.username}')">Elimina</button>
            </div>
        `).join("");
    }

    window.addCoordinator = async () => {
        const user = document.getElementById("newUser").value.trim();
        const pass = document.getElementById("newPass").value.trim();
        const fullName = document.getElementById("newFullName").value.trim();
        const country = document.getElementById("newCountry").value.trim();
        const phone = document.getElementById("newPhone").value.trim();
        if (!user || !pass) { alert("Nome utente e password richiesti"); return; }
        if (allUsers[user]) { alert("Utente già esistente"); return; }
        const newId = Date.now();
        const newCoord = { id: newId, username: user, password: pass, role: "coord", country, phone, fullName };
        await db.ref(`users/${user}`).set(newCoord);
        addLog("Aggiunta accompagnatore", `Aggiunto ${user}`);
        alert("Accompagnatore creato");
    };

    window.resetCoordPass = async (username) => {
        const newPass = prompt("Nuova password per " + username, "123456");
        if (newPass) {
            await db.ref(`users/${username}`).update({ password: newPass });
            alert("Password modificata");
        }
    };

    window.deleteCoord = async (username) => {
        if (confirm(`Eliminare ${username} e tutti i membri del suo paese?`)) {
            const coord = allUsers[username];
            if (coord && coord.country) {
                const membersToDelete = Object.values(allMembers).filter(m => m.country === coord.country);
                for (let m of membersToDelete) {
                    await db.ref(`members/${m.id}`).remove();
                }
            }
            await db.ref(`users/${username}`).remove();
            addLog("Eliminazione accompagnatore", `Eliminato ${username}`);
            alert("Eliminato");
        }
    };

    function renderCountries() {
        const container = document.getElementById("countriesContainer");
        if (!container) return;
        const map = new Map();
        Object.values(allMembers).forEach(m => {
            if (!map.has(m.country)) map.set(m.country, []);
            map.get(m.country).push(m);
        });
        let html = "";
        for (let [country, members] of map.entries()) {
            const coord = Object.values(allUsers).find(u => u.role === "coord" && u.country === country);
            const coordDisplay = coord ? `<span class="badge bg-boat">👤 ${coord.fullName || coord.username} | 📞 ${coord.phone || '—'}</span>` : `<span class="badge bg-warn">Nessun accompagnatore</span>`;
            html += `
                <div class="country-card" data-country="${country}">
                    <div class="country-header">
                        <div><h3>${country}</h3> ${coordDisplay}</div>
                        <span class="badge bg-boat">Totale: ${members.length}</span>
                    </div>
                    <div class="country-body">
                        <div class="select-all-bar">
                            <select id="bulk_${country.replace(/\s/g,'')}">
                                <option value="">Cambia stato per tutti</option>
                                <option value="in_accademia">In Accademia</option>
                                <option value="out_accademia">Fuori Accademia</option>
                                <option value="prep_out">Preparazione Uscita</option>
                                <option value="prep_in">Preparazione Entrata</option>
                                <option value="on_boats">Sulle Barche</option>
                                <option value="prep_boats">Preparazione Barche</option>
                                <option value="exceptional">Eccezionale</option>
                            </select>
                            <button class="btn-sm" onclick="applyBulk('${country}')">Applica</button>
                        </div>
                        <table>
                            <thead><tr><th>Nome / Grado</th><th>Stato</th><th>Azione</th></tr></thead>
                            <tbody>
                                ${members.map(m => `
                                    <tr>
                                        <td><b>${m.name}</b><br><small>${m.rank}</small><br><small>📞 ${m.phone || "—"}</small></td>
                                        <td><span class="badge ${getStatusClass(m.status)}">${getStatusText(m.status)}</span><br><small>${m.lastUpdate}</small></td>
                                        <td>
                                            <select onchange="changeStatus(${m.id}, this.value)" style="width:120px; font-size:0.7rem;">
                                                <option value="">Cambia</option>
                                                <option value="in_accademia">In Accademia</option>
                                                <option value="out_accademia">Fuori Accademia</option>
                                                <option value="prep_out">Prep. Uscita</option>
                                                <option value="prep_in">Prep. Entrata</option>
                                                <option value="on_boats">Sulle Barche</option>
                                                <option value="prep_boats">Prep. Barche</option>
                                                <option value="exceptional">Eccezionale</option>
                                            </select>
                                            <button class="btn-sm" onclick="openWA('${m.phone}')"><i class="fab fa-whatsapp"></i></button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    window.applyBulk = async (country) => {
        const select = document.getElementById(`bulk_${country.replace(/\s/g,'')}`);
        const newStatus = select.value;
        if (!newStatus) return;
        const membersToUpdate = Object.values(allMembers).filter(m => m.country === country);
        const now = new Date().toLocaleString('it-IT');
        for (let m of membersToUpdate) {
            await db.ref(`members/${m.id}`).update({ status: newStatus, lastUpdate: now });
        }
        addLog("Modifica massiva", `${country} -> tutti ${getStatusText(newStatus)}`);
        alert(`Aggiornati ${membersToUpdate.length} membri a ${getStatusText(newStatus)}`);
    };

    window.changeStatus = async (id, newStatus) => {
        if (!newStatus) return;
        const member = allMembers[id];
        if (member) {
            const old = member.status;
            await db.ref(`members/${id}`).update({ status: newStatus, lastUpdate: new Date().toLocaleString('it-IT') });
            addLog("Cambio stato", `${member.name}: ${getStatusText(old)} → ${getStatusText(newStatus)}`);
        }
    };

    function getStatusText(status) {
        const map = {
            'in_accademia': 'In Accademia',
            'out_accademia': 'Fuori Accademia',
            'prep_out': 'Preparazione Uscita',
            'prep_in': 'Preparazione Entrata',
            'on_boats': 'Sulle Barche',
            'prep_boats': 'Preparazione Barche',
            'exceptional': 'Eccezionale'
        };
        return map[status] || status;
    }

    function getStatusClass(status) {
        switch(status) {
            case 'in_accademia': return 'bg-in';
            case 'out_accademia': return 'bg-out';
            case 'prep_out': case 'prep_in': return 'bg-prep';
            case 'on_boats': case 'prep_boats': return 'bg-boat';
            case 'exceptional': return 'bg-warn';
            default: return 'bg-prep';
        }
    }

    window.openDetailModal = (status) => {
        const modal = document.getElementById("detailModal");
        let title = status === 'all' ? "Tutti i membri" : getStatusText(status);
        document.getElementById("modalTitle").innerText = `Lista: ${title}`;
        let filtered = status === 'all' ? Object.values(allMembers) : Object.values(allMembers).filter(m => m.status === status);
        if (filtered.length === 0) document.getElementById("modalContent").innerHTML = "<p>Nessun membro</p>";
        else document.getElementById("modalContent").innerHTML = `<div style="overflow-x:auto;"><table style="width:100%;"><thead><tr><th>Paese</th><th>Nome</th><th>Grado</th><th>Ultimo aggiornamento</th></tr></thead><tbody>${filtered.map(m => `<tr><td>${m.country}</td><td>${m.name}</td><td>${m.rank}</td><td>${m.lastUpdate}</td></tr>`).join('')}</tbody></table></div>`;
        modal.style.display = "flex";
    };

    window.openLogsModal = async () => {
        const snapshot = await db.ref('logs').once('value');
        const logs = snapshot.val() ? Object.values(snapshot.val()).slice(0,100) : [];
        const modal = document.getElementById("detailModal");
        document.getElementById("modalTitle").innerHTML = "Registro operazioni";
        if (logs.length === 0) document.getElementById("modalContent").innerHTML = "<p>Nessun log</p>";
        else document.getElementById("modalContent").innerHTML = `<div style="overflow-y:auto; max-height:70vh;">${logs.map(l => `<div class="log-item">🕒 ${l.time} | 👤 ${l.user} | 📌 ${l.action} | ${l.details}</div>`).join('')}</div>`;
        modal.style.display = "flex";
    };

    window.exportData = () => {
        let csv = [["Paese","Nome","Grado","Telefono","Stato","Ultimo aggiornamento"]];
        Object.values(allMembers).forEach(m => csv.push([m.country, m.name, m.rank, m.phone, getStatusText(m.status), m.lastUpdate]));
        const link = document.createElement("a");
        link.href = "data:text/csv;charset=utf-8," + csv.map(row => row.join(",")).join("\n");
        link.download = "export.csv";
        link.click();
        addLog("Esportazione", "Esportato CSV");
    };

    window.openWA = (phone) => { if (phone) window.open(`https://wa.me/${phone.replace(/[^0-9+]/g,'')}`,'_blank'); else alert("Numero non presente"); };
    window.closeModal = () => document.getElementById("detailModal").style.display = "none";

    async function attemptLogin() {
        const user = document.getElementById("loginUser").value;
        const pass = document.getElementById("loginPass").value;
        if (allUsers[user] && allUsers[user].password === pass && allUsers[user].role === "admin") {
            currentUser = allUsers[user];
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("userBadge").innerText = "Amministratore";
            addLog("Accesso", "Amministratore loggato");
            db.ref('users').on('value', (snap) => { allUsers = snap.val() || {}; renderCoordsList(); renderCountries(); });
            db.ref('members').on('value', (snap) => { allMembers = snap.val() || {}; refreshStats(); renderCountries(); });
            renderSidePanel();
        } else { alert("Credenziali non valide o non sei amministratore"); }
    }

    window.logout = () => location.reload();
    window.attemptLogin = attemptLogin;
    window.onload = () => { document.getElementById("authScreen").style.display = "flex"; };
    window.filterCountries = () => {
        const query = document.getElementById("globalSearch").value.toLowerCase();
        document.querySelectorAll(".country-card").forEach(card => {
            const countryName = card.getAttribute("data-country").toLowerCase();
            card.style.display = countryName.includes(query) ? "block" : "none";
        });
    };
</script>
</body>
</html>
